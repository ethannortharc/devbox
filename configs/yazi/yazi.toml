# Devbox yazi configuration — pretty previews with bat/glow
# Pushed to ~/.config/yazi/yazi.toml inside the VM

[manager]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true

[preview]
max_width  = 1000
max_height = 1000

[plugin]
prepend_previewers = [
  { mime = "text/markdown", run = "glow" },
  { name = "*.md",         run = "glow" },
  { name = "*.mdx",        run = "glow" },
]

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Neovim" },
]
edit-helix = [
  { run = 'helix "$@"', block = true, desc = "Helix" },
]
view = [
  { run = 'bat --paging=always --style=full "$@"', block = true, desc = "View with bat" },
]
view-markdown = [
  { run = 'glow -p -w $COLUMNS "$@"', block = true, desc = "Render markdown" },
]
lazygit = [
  { run = 'lazygit', block = true, desc = "Open lazygit" },
]
lazydocker = [
  { run = 'lazydocker', block = true, desc = "Open lazydocker" },
]
open = [
  { run = 'xdg-open "$@"', desc = "System open" },
]

[open]
prepend_rules = [
  # Markdown — render with glow on Enter, then edit option
  # prepend_rules ensures these match before any built-in or text/* rules
  { name = "*.md",             use = ["view-markdown", "edit"] },
  { name = "*.mdx",            use = ["view-markdown", "edit"] },
  { name = "README",           use = ["view-markdown", "edit"] },
  { mime = "text/markdown",    use = ["view-markdown", "edit"] },

  # Git directory — open lazygit
  { name = ".git/",            use = ["lazygit"] },
]

rules = [
  # Code and text — edit with nvim (first = default on Enter)
  { mime = "text/*",           use = ["edit", "view"] },
  { mime = "*/json",           use = ["edit", "view"] },
  { mime = "*/toml",           use = ["edit", "view"] },
  { mime = "*/yaml",           use = ["edit", "view"] },
  { mime = "*/xml",            use = ["edit", "view"] },
  { name = "*.nix",            use = ["edit", "view"] },
  { name = "*.rs",             use = ["edit", "view"] },
  { name = "*.go",             use = ["edit", "view"] },
  { name = "*.py",             use = ["edit", "view"] },
  { name = "*.js",             use = ["edit", "view"] },
  { name = "*.ts",             use = ["edit", "view"] },
  { name = "*.tsx",            use = ["edit", "view"] },
  { name = "*.jsx",            use = ["edit", "view"] },
  { name = "*.lua",            use = ["edit", "view"] },
  { name = "*.sh",             use = ["edit", "view"] },
  { name = "*.bash",           use = ["edit", "view"] },
  { name = "*.zsh",            use = ["edit", "view"] },
  { name = "Makefile",         use = ["edit", "view"] },
  { name = "Dockerfile",       use = ["edit", "view"] },
  { name = "*.kdl",            use = ["edit", "view"] },

  # Fallback
  { name = "*",                use = ["edit", "open"] },
]
