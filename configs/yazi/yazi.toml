# Devbox yazi configuration — pretty previews with bat/glow
# Pushed to ~/.config/yazi/yazi.toml inside the VM

[manager]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true

[preview]
max_width  = 1000
max_height = 1000

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Edit in Neovim" },
  { run = 'helix "$@"', block = true, desc = "Edit in Helix" },
]
open = [
  { run = 'xdg-open "$@"', desc = "System open" },
]
reveal = [
  { run = 'bat --paging=always --style=full "$@"', block = true, desc = "View with bat" },
]
view_markdown = [
  { run = 'glow -p "$@"', block = true, desc = "Render markdown" },
]
lazygit = [
  { run = 'lazygit', block = true, desc = "Open lazygit" },
]
lazydocker = [
  { run = 'lazydocker', block = true, desc = "Open lazydocker" },
]

[open]
rules = [
  { mime = "text/markdown",    use = ["view_markdown", "edit"] },
  { name = "*.md",             use = ["view_markdown", "edit"] },
  { name = "*.mdx",            use = ["view_markdown", "edit"] },
  { name = ".git/",            use = ["lazygit"] },

  # Code and text
  { mime = "text/*",           use = ["edit", "reveal"] },
  { mime = "*/json",           use = ["edit", "reveal"] },
  { mime = "*/toml",           use = ["edit", "reveal"] },
  { mime = "*/yaml",           use = ["edit", "reveal"] },
  { mime = "*/xml",            use = ["edit", "reveal"] },
  { name = "*.nix",            use = ["edit", "reveal"] },

  # Fallback
  { name = "*",                use = ["edit", "open"] },
]
